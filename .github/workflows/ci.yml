name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure index exists
        run: test -f index.html
      - name: Ensure embed script exists
        run: grep -q "widget.zivo.one/embed.js" index.html
