name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure index exists
        run: test -f index.html
      - name: Ensure runtime widget config exists
        run: test -f assets/widget-config.js
      - name: Ensure runtime loader exists
        run: grep -q "initWidgetEmbed" assets/script.js
